<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="./svg.min.js"></script>
</head>
<body>
    <div id="svg_shape" style="border: 1px solid #000; width: fit-content;"></div>
    <script src="./Shape_svg.js"></script>
    <script>
        // Instance Shape (element, baseWidthElement, width, height, scale, title)
        const baseWidth = 130,
            widthShape = 500,
            heightShape = 600,
            dataX = 50,
            dataY = 200;
        const shape = new window.Shape('#svg_shape', baseWidth, widthShape, heightShape, 1, "Họ tên: Nguyễn Văn XXX\nNgày sinh: xx/xx/xx");
        
        const widthBox3 = Math.sqrt((baseWidth*5/4)**2 + baseWidth**2);
        const ratioWidthBox3 = widthBox3/baseWidth;
        const rotateBox3 =  Math.sin(baseWidth / widthBox3) * (180/Math.PI) + 5;
        const dataShape = [
            {
                width: 1,
                height: 1,
                points: ['B', '', '', 'H'],
                params: [9, 1, 27, 18],
                text: {
                    tspan1: 'Tiên cảnh',
                    tspan2: '(0-27)'
                },
                xX: dataX,
                yY: dataY,
                x: {
                    color: 'blue',
                    x1: true,
                    x2: true,
                    x3: true,
                    x4: true
                },
                digit: {
                    color: '#000',
                    point: ['u=21/3', 'c3', '6', 'u=3'],
                    inside: 3
                },
                transfrom: {}
            },
            {
                width: 5/4,
                height: 5/4,
                points: ['C', 'F', 'E', 'D'],
                params: [27, 54, 45, 36],
                text: {
                    tspan1: 'Tiên cảnh',
                    tspan2: '(0-27)'
                },
                xX: dataX + baseWidth,
                yY: dataY + baseWidth,
                x: {
                    color: 'blue',
                    x1: true,
                    x2: true,
                    x3: true,
                    x4: true
                },
                digit: {
                    color: '#000',
                    point: ['c=3', '24/6', 't=20/2', 'i=9']
                },
                transfrom: {}
            },
            {
                width: ratioWidthBox3,
                height: ratioWidthBox3,
                points: ['I', 'G', '', 'A'],
                params: [72, 63, 54, 81],
                text: {
                    tspan1: 'Sức mạnh',
                    tspan2: '(0-27)'
                },
                xX: dataX + baseWidth,
                yY: dataY - ratioWidthBox3*baseWidth,
                x: {
                    color: 'blue',
                    x1: true,
                    x2: true,
                    x3: true,
                    x4: true
                },
                digit: {
                    color: '#000',
                    point: ['n=14/5', 'i=9', 't=20/2', '1985=27/5'],
                    inside: 4
                },
                transfrom: {
                    rotate: rotateBox3,
                    origin: 'bottom left',
                    flip: 'left',
                    translate: [5, -28]
                }
            }
        ];
        shape.render({
            dataShape,
            x: dataX,
            y: dataX,
            triangleText: '56/11/12'
        });
    </script>
</body>
</html>
